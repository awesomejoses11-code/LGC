<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LGC • The Bridge Was Lagging</title>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; -webkit-tap-highlight-color: transparent; }
    body { 
      background: linear-gradient(135deg, #0f1419 0%, #1a2847 50%, #0f1419 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      line-height: 1.5;
    }
    .app-wrapper { height: 100%; padding: 20px; overflow-y: auto; }
    .container { 
      max-width: 500px; width: 100%; margin: 0 auto; 
      display: flex; flex-direction: column; gap: 24px;
      padding-bottom: 40px;
    }

    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .logo-circle {
      width: 70px; height: 70px; border-radius: 50%;
      background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%);
      border: 2px solid #d4af37;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: bold; color: #fff;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }
    .connect-btn {
      background: rgba(212, 175, 55, 0.1); border: 1.5px solid #d4af37;
      color: #d4af37; padding: 10px 16px; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s;
    }
    .connect-btn:active { transform: scale(0.95); background: rgba(212, 175, 55, 0.2); }

    .title-main { font-size: 32px; font-weight: 700; color: #d4af37; text-align: center; }
    .title-sub { font-size: 14px; color: #a8a8a8; text-align: center; margin-top: 4px; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .stat-card {
      background: rgba(26, 40, 71, 0.6); border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 16px; padding: 18px; text-align: center;
    }
    .stat-label { color: #7a8a9a; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { color: #d4af37; font-size: 24px; font-weight: 700; margin-top: 4px; }

    .balance-section {
      background: linear-gradient(135deg, rgba(26, 40, 71, 0.8), rgba(45, 90, 123, 0.5));
      border: 1.5px solid rgba(212, 175, 55, 0.25); border-radius: 20px;
      padding: 32px 24px; text-align: center; position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    .balance-value { font-size: 48px; font-weight: 700; color: #d4af37; margin: 12px 0; word-break: break-all; }

    .tap-btn, .claim-btn {
      width: 100%; padding: 18px; border: none; border-radius: 16px;
      font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 12px; 
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: transform 0.1s;
    }
    .tap-btn {
      background: linear-gradient(135deg, #d4af37 0%, #f0e68c 100%);
      color: #1a2847;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
    }
    .claim-btn {
      background: linear-gradient(135deg, #00ff64, #00cc52);
      color: #000;
      box-shadow: 0 4px 15px rgba(0, 255, 100, 0.3);
    }
    .tap-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    .claim-btn:disabled { 
      background: #333; 
      color: #777; 
      box-shadow: none; 
      cursor: not-allowed;
    }

    .float-text {
      position: absolute; color: #d4af37; font-weight: bold; font-size: 24px;
      pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 20;
      text-shadow: 0 0 5px rgba(0,0,0,0.5);
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    .card {
      background: rgba(26, 40, 71, 0.6); border: 1px solid rgba(212, 175, 55, 0.15);
      border-radius: 16px; padding: 20px;
    }
    .list-item {
      display: flex; justify-content: space-between; padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .list-item:last-child { border: none; }

    #notification {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #d4af37; color: #1a2847; padding: 12px 24px;
      border-radius: 50px; font-weight: 600; z-index: 1000;
      display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    /* Progress Bar Styles */
    .progress-container {
      width: 100%; height: 8px; background: rgba(255,255,255,0.1);
      border-radius: 10px; margin-top: 15px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; background: #00ff64; width: 0%;
      transition: width 0.3s ease;
    }
    .min-label { font-size: 11px; color: #7a8a9a; margin-top: 6px; display: block; }
  </style>
</head>
<body>
  <div id="notification"></div>
  <div class="app-wrapper">
    <div class="container">

      <div class="header-top">
        <div class="logo-circle">LGC</div>
        <button class="connect-btn" id="headerConnectBtn">Connect</button>
      </div>

      <div>
        <h1 class="title-main">The Bridge Was Lagging</h1>
        <p class="title-sub">Time to farm LGC while you wait</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Today's Taps</div>
          <div class="stat-value" id="todayTaps">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Stockpile</div>
          <div class="stat-value" id="stockpile">50000</div>
        </div>
      </div>

      <div class="balance-section" id="balanceSection">
        <div style="color:#a8a8a8; font-size:13px; letter-spacing: 1px;">CURRENT BALANCE</div>
        <div id="balanceValue" class="balance-value">0</div>
        
        <div class="progress-container">
          <div id="withdrawProgress" class="progress-bar"></div>
        </div>
        <span class="min-label" id="minLabel">Min. withdrawal: 150,000 LGC</span>

        <button id="tapBtn" class="tap-btn">
          <i data-lucide="zap" style="width:22px;height:22px;"></i> TAP TO MINE
        </button>
        <button id="claimBtn" class="claim-btn">
          <i data-lucide="check-circle" style="width:22px;height:22px;"></i> SYNC & CLAIM
        </button>
        <div id="limitInfo" style="margin-top:15px; font-size:13px; color:#a8a8a8;">0 / 24,000 taps today</div>
      </div>

      <div class="card">
        <h2 style="color:#d4af37; margin-bottom:16px; font-size: 18px;">🏆 Top Miners</h2>
        <div id="leaderboardList">
            <div style="text-align:center; color:#555; padding:20px; font-style: italic;">Syncing world data...</div>
        </div>
      </div>

      <div class="card" style="text-align: center;">
        <div id="walletStatus" style="padding:10px; border-radius:8px; background:rgba(255,107,107,0.1); color:#ff6b6b; font-size: 14px;">
          Wallet Not Connected
        </div>
      </div>

    </div>
  </div>

  <script>
    const STORAGE_KEY = 'lgc_miner_data_v1';
    const DAILY_TAP_LIMIT = 24000;
    const MAX_STOCKPILE = 50000;
    const LGC_PER_TAP = 20;
    const MIN_WITHDRAWAL = 150000;

    let state = {
      balance: 0,
      todayTaps: 0,
      stockpile: 50000,
      lastTapDate: ""
    };

    let walletAddress = null;
    let tonConnectUI = null;

    function showNotification(msg) {
      const el = document.getElementById('notification');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) state = { ...state, ...JSON.parse(saved) };
      updateUI();
    }

    async function syncToDatabase() {
      if (!walletAddress) {
        showNotification("Connect wallet to sync!");
        return;
      }

      if (state.balance < MIN_WITHDRAWAL) {
        showNotification(`Need ${MIN_WITHDRAWAL.toLocaleString()} LGC to claim!`);
        return;
      }
      
      const claimBtn = document.getElementById('claimBtn');
      claimBtn.disabled = true;
      claimBtn.innerHTML = '<i data-lucide="refresh-cw" class="animate-spin"></i> SYNCING...';
      lucide.createIcons();

      try {
        const response = await fetch('/api/sync', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            address: walletAddress,
            score: state.balance
          })
        });

        const result = await response.json();
        if (result.success) {
          showNotification("Progress Saved!");
          renderLeaderboard(result.leaderboard);
        }
      } catch (e) {
        showNotification("Sync Failed. Try again.");
      } finally {
        claimBtn.disabled = false;
        claimBtn.innerHTML = '<i data-lucide="check-circle"></i> SYNC & CLAIM';
        lucide.createIcons();
      }
    }

    function renderLeaderboard(list) {
      const listEl = document.getElementById('leaderboardList');
      if (!list || list.length === 0) return;
      
      listEl.innerHTML = list.map((item, index) => `
        <div class="list-item">
          <span>${index + 1}. ${item.wallet_address.slice(0,6)}...${item.wallet_address.slice(-4)}</span>
          <span style="color:#00ff64;">${item.score.toLocaleString()} LGC</span>
        </div>
      `).join('');
    }

    function handleTap() {
      if (state.todayTaps >= DAILY_TAP_LIMIT || state.stockpile <= 0) return;

      state.stockpile--;
      state.todayTaps++;
      state.balance += LGC_PER_TAP;

      spawnFloatText(LGC_PER_TAP);
      updateUI();
      saveState();
    }

    function spawnFloatText(val) {
      const float = document.createElement('div');
      float.className = 'float-text';
      float.textContent = `+${val}`;
      float.style.left = `${Math.random() * 40 + 30}%`;
      float.style.top = '40%';
      document.getElementById('balanceSection').appendChild(float);
      setTimeout(() => float.remove(), 1000);
    }

    function updateUI() {
      document.getElementById('balanceValue').textContent = state.balance.toLocaleString();
      document.getElementById('todayTaps').textContent = state.todayTaps.toLocaleString();
      document.getElementById('stockpile').textContent = state.stockpile.toLocaleString();
      document.getElementById('limitInfo').textContent = `${state.todayTaps.toLocaleString()} / ${DAILY_TAP_LIMIT.toLocaleString()} taps today`;
      
      // Update Progress Bar
      const progress = Math.min(100, (state.balance / MIN_WITHDRAWAL) * 100);
      document.getElementById('withdrawProgress').style.width = `${progress}%`;
      
      // Update Button state
      const claimBtn = document.getElementById('claimBtn');
      if (state.balance < MIN_WITHDRAWAL) {
        claimBtn.disabled = true;
        document.getElementById('minLabel').textContent = `Keep mining! ${Math.max(0, MIN_WITHDRAWAL - state.balance).toLocaleString()} LGC left to unlock claim.`;
      } else {
        claimBtn.disabled = false;
        document.getElementById('minLabel').textContent = `Withdrawal Unlocked! 🚀`;
      }
    }

    window.onload = () => {
      lucide.createIcons();
      loadState();

      tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://lgcminer.vercel.app/tonconnect-manifest.json',
      });

      tonConnectUI.onStatusChange((wallet) => {
        const statusEl = document.getElementById('walletStatus');
        if (wallet) {
          walletAddress = wallet.account.address;
          statusEl.textContent = `Connected: ${walletAddress.slice(0,6)}...`;
          statusEl.style.background = 'rgba(0,255,100,0.1)';
          statusEl.style.color = '#00ff64';
        } else {
          walletAddress = null;
          statusEl.textContent = 'Wallet Not Connected';
          statusEl.style.background = 'rgba(255,107,107,0.1)';
          statusEl.style.color = '#ff6b6b';
        }
      });

      document.getElementById('tapBtn').addEventListener('click', handleTap);
      document.getElementById('claimBtn').addEventListener('click', syncToDatabase);
      document.getElementById('headerConnectBtn').addEventListener('click', () => tonConnectUI.openModal());

      // Regen stockpile
      setInterval(() => {
        if (state.stockpile < MAX_STOCKPILE) {
          state.stockpile = Math.min(MAX_STOCKPILE, state.stockpile + 5);
          document.getElementById('stockpile').textContent = state.stockpile.toLocaleString();
        }
      }, 5000);
    };
  </script>
</body>
</html>

```
