<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LGC • The Bridge Was Lagging</title>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

  <style>
    :root {
      --gold: #d4af37;
      --gold-light: #f0e68c;
      --bg-dark: #0b0f13;
      --card-bg: rgba(26, 40, 71, 0.45);
      --glass: rgba(255, 255, 255, 0.03);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: radial-gradient(circle at top, #1a2847 0%, #0b0f13 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-wrapper { padding: 16px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; }

    /* Header */
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-top: 8px; }
    .logo-box {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-circle {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%);
      border: 1.5px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; color: var(--gold);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
    }
    
    .connect-btn {
      background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.3);
      color: var(--gold); padding: 8px 16px; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer; backdrop-filter: blur(10px);
      transition: all 0.2s;
    }

    /* Main Balance Card */
    .balance-section {
      background: linear-gradient(180deg, rgba(45, 90, 123, 0.2) 0%, rgba(26, 40, 71, 0.4) 100%);
      border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 28px;
      padding: 30px 20px; text-align: center; margin-bottom: 20px;
      backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      position: relative;
    }
    .balance-label { color: #7a8a9a; font-size: 11px; letter-spacing: 2px; font-weight: 700; margin-bottom: 5px; }
    .balance-value { font-size: 48px; font-weight: 800; color: var(--gold); margin: 5px 0; text-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

    /* Mining Button - Fixed scaling */
    .tap-btn {
      width: 100%; padding: 18px; border: none; border-radius: 16px;
      font-size: 17px; font-weight: 800; cursor: pointer;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      color: #1a2847; transition: transform 0.05s;
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.25);
      margin-top: 15px;
    }
    .tap-btn:active { transform: scale(0.97); }
    .tap-btn:disabled { opacity: 0.4; filter: grayscale(1); pointer-events: none; }

    .secondary-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .action-btn {
      padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .action-btn.active { background: #00ff64; color: #000; border: none; }
    .action-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    /* Stats Grid */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .small-card { background: var(--card-bg); border-radius: 16px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
    .small-card label { display: block; font-size: 10px; color: #7a8a9a; font-weight: 600; margin-bottom: 2px; }
    .small-card span { font-size: 17px; font-weight: 700; color: #fff; }

    /* Referral Card */
    .card { background: var(--card-bg); border-radius: 20px; padding: 18px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: var(--gold); }
    
    .ref-reward-tag {
      background: rgba(212, 175, 55, 0.12); color: var(--gold);
      padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 700;
      margin-bottom: 10px; display: inline-block;
    }

    .invite-btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      background: #24A1DE; color: white; display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 12px rgba(36, 161, 222, 0.25); margin-top: 10px;
    }

    /* Footer / Links */
    .footer-links { text-align: center; padding: 20px 0; margin-top: auto; }
    .tonviewer-link { 
      color: #444; font-size: 11px; text-decoration: none; 
      display: inline-flex; align-items: center; gap: 4px; 
    }
    .tonviewer-link:hover { color: var(--gold); }

    /* Progress & Animation */
    .progress-wrap { height: 6px; background: rgba(0,0,0,0.3); border-radius: 10px; margin: 16px 0 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: #00ff64; width: 0%; transition: width 0.5s ease; box-shadow: 0 0 10px rgba(0,255,100,0.2); }
    
    .float-text {
      position: absolute; color: var(--gold); font-weight: 900; font-size: 26px;
      pointer-events: none; animation: floatUp 0.7s ease-out forwards; z-index: 100;
      text-shadow: 0 2px 5px rgba(0,0,0,0.4);
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
    }

    #notification {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: var(--gold); color: #000; padding: 12px 24px;
      border-radius: 50px; font-weight: 700; z-index: 2000;
      display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 13px;
    }
    
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="notification"></div>

<div class="app-wrapper">
  
  <header class="header-top">
    <div class="logo-box">
        <div class="logo-circle">LGC</div>
        <div style="font-size: 12px; color: #a8a8a8; font-weight: 600;">LGC Miner</div>
    </div>
    <button class="connect-btn" id="headerConnectBtn">Connect</button>
  </header>

  <section class="balance-section" id="balanceArea">
    <p class="balance-label">MINING BALANCE</p>
    <h1 class="balance-value" id="balanceDisplay">0</h1>
    
    <div class="progress-wrap">
      <div id="withdrawProgress" class="progress-fill"></div>
    </div>
    <p id="minLabel" style="font-size: 11px; color: #7a8a9a;">Goal: 150,000 LGC for claim</p>

    <button id="tapBtn" class="tap-btn">START MINING</button>
    
    <div class="secondary-btns">
      <button class="action-btn" id="syncBtn">
        <i data-lucide="refresh-cw" style="width:14px;"></i> Sync Progress
      </button>
      <button class="action-btn" id="claimBtn" disabled>
        <i data-lucide="external-link" style="width:14px;"></i> Claim LGC
      </button>
    </div>
  </section>

  <div class="stats-row">
    <div class="small-card">
      <label>Today's Taps</label>
      <span id="todayTaps">0</span>
    </div>
    <div class="small-card">
      <label>Energy Left</label>
      <span id="stockpile">50,000</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><i data-lucide="share-2" style="width:16px;"></i> Referral Link</div>
    <div class="ref-reward-tag">🎁 2,000 LGC + 10% Lifetime Bonus</div>
    <p style="font-size: 12px; color: #888; line-height: 1.4;">Invite friends to join the LGC mining farm. Bonuses are added instantly upon their first sync.</p>
    
    <button id="inviteBtn" class="invite-btn">
      <i data-lucide="send" style="width:18px;"></i> INVITE VIA TELEGRAM
    </button>
  </div>

  <div class="card">
    <div class="card-title"><i data-lucide="award" style="width:16px;"></i> Top Miners</div>
    <div id="leaderboardList" style="font-size: 13px;">
      <div style="text-align:center; color:#444; padding:15px; font-style: italic;">Syncing leaderboard...</div>
    </div>
  </div>

  <footer class="footer-links">
    <a href="https://tonviewer.com/EQDQzJMIMkb_oGNQMDPukE4vmqaeTiDZrJbKKP1OfohSiqej" target="_blank" class="tonviewer-link">
      <i data-lucide="shield-check" style="width:12px;"></i> Verified Contract: Tonviewer
    </a>
  </footer>

</div>

<script>
  const CONFIG = {
    DAILY_LIMIT: 24000,
    MAX_ENERGY: 50000,
    REGEN_RATE: 5,
    PER_TAP: 20,
    MIN_WITHDRAW: 150000,
    REF_BONUS: 2000,
    TG_BOT_URL: "https://t.me/LGCMinerBot"
  };

  let state = {
    balance: 0,
    todayTaps: 0,
    energy: 50000,
    wallet: null
  };

  let tonConnectUI;

  function notify(msg) {
    const el = document.getElementById('notification');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function updateUI() {
    document.getElementById('balanceDisplay').textContent = state.balance.toLocaleString();
    document.getElementById('todayTaps').textContent = state.todayTaps.toLocaleString();
    document.getElementById('stockpile').textContent = state.energy.toLocaleString();
    
    const progress = Math.min(100, (state.balance / CONFIG.MIN_WITHDRAW) * 100);
    const progressEl = document.getElementById('withdrawProgress');
    if (progressEl) progressEl.style.width = `${progress}%`;
    
    const claimBtn = document.getElementById('claimBtn');
    const minLabel = document.getElementById('minLabel');
    
    if (state.balance >= CONFIG.MIN_WITHDRAW) {
      claimBtn.disabled = false;
      claimBtn.classList.add('active');
      minLabel.textContent = "Withdrawal Unlocked! 🚀";
      minLabel.style.color = "#00ff64";
    } else {
      claimBtn.disabled = true;
      claimBtn.classList.remove('active');
      minLabel.textContent = `Goal: ${CONFIG.MIN_WITHDRAW.toLocaleString()} LGC for claim`;
      minLabel.style.color = "#7a8a9a";
    }

    document.getElementById('tapBtn').disabled = state.energy <= 0 || state.todayTaps >= CONFIG.DAILY_LIMIT;
  }

  function spawnFloatText(e) {
    if (!e) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    
    if (!x || !y) return;

    const float = document.createElement('div');
    float.className = 'float-text';
    float.textContent = `+${CONFIG.PER_TAP}`;
    float.style.left = `${x - 15}px`;
    float.style.top = `${y - 40}px`;
    float.style.position = 'fixed';
    document.body.appendChild(float);
    setTimeout(() => float.remove(), 700);
  }

  function handleTap(e) {
    if (state.energy <= 0 || state.todayTaps >= CONFIG.DAILY_LIMIT) return;

    state.energy--;
    state.todayTaps++;
    state.balance += CONFIG.PER_TAP;

    spawnFloatText(e);
    if (navigator.vibrate) navigator.vibrate(5);
    updateUI();
    saveLocal();
  }

  async function syncProgress() {
    if (!state.wallet) {
      notify("Connect wallet first!");
      tonConnectUI.openModal();
      return;
    }

    const btn = document.getElementById('syncBtn');
    const original = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="refresh-cw" class="animate-spin" style="width:14px;"></i>';
    lucide.createIcons();

    try {
      const response = await fetch('/api/sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address: state.wallet, score: state.balance })
      });
      const data = await response.json();
      if (data.success) {
        notify("Progress Synced!");
        renderLeaderboard(data.leaderboard);
      }
    } catch (err) {
      notify("Offline Sync Saved.");
    } finally {
      btn.disabled = false;
      btn.innerHTML = original;
      lucide.createIcons();
    }
  }

  function renderLeaderboard(list) {
    const el = document.getElementById('leaderboardList');
    if (!list || !list.length) return;
    el.innerHTML = list.map((item, i) => `
      <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.03);">
        <span style="color:#a8a8a8">${i+1}. ${item.wallet_address.slice(0,6)}...</span>
        <span style="color:var(--gold); font-weight:700;">${item.score.toLocaleString()}</span>
      </div>
    `).join('');
  }

  function handleInvite() {
    const refLink = `${CONFIG.TG_BOT_URL}?start=${state.wallet || 'newUser'}`;
    const shareText = encodeURIComponent("🚀 Farm LGC with me! Get 2,000 LGC bonus instantly. Let's mine while the bridge lags!");
    window.open(`https://t.me/share/url?url=${encodeURIComponent(refLink)}&text=${shareText}`, '_blank');
  }

  function saveLocal() {
    localStorage.setItem('lgc_state_v2', JSON.stringify({
      balance: state.balance,
      todayTaps: state.todayTaps,
      date: new Date().toDateString()
    }));
  }

  function loadLocal() {
    const saved = localStorage.getItem('lgc_state_v2');
    if (saved) {
      const data = JSON.parse(saved);
      if (data.date === new Date().toDateString()) {
        state.todayTaps = data.todayTaps || 0;
      }
      state.balance = data.balance || 0;
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('start') && !localStorage.getItem('lgc_ref_init')) {
      state.balance += CONFIG.REF_BONUS;
      localStorage.setItem('lgc_ref_init', 'true');
      notify(`Referral Bonus: +${CONFIG.REF_BONUS} LGC!`);
    }
  }

  window.addEventListener('load', () => {
    try {
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://lgcminer.vercel.app/tonconnect-manifest.json',
        });

        tonConnectUI.onStatusChange(wallet => {
            const btn = document.getElementById('headerConnectBtn');
            if (wallet) {
                state.wallet = wallet.account.address;
                btn.textContent = `${state.wallet.slice(0,4)}...${state.wallet.slice(-4)}`;
                syncProgress();
            } else {
                state.wallet = null;
                btn.textContent = "Connect";
            }
        });
    } catch (e) { console.error("TonConnect failed to init", e); }

    lucide.createIcons();
    loadLocal();
    updateUI();

    document.getElementById('tapBtn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleTap(e);
    }, { passive: false });
    
    document.getElementById('tapBtn').addEventListener('click', (e) => {
        if (!('ontouchstart' in window)) handleTap(e);
    });

    document.getElementById('syncBtn').addEventListener('click', syncProgress);
    document.getElementById('inviteBtn').addEventListener('click', handleInvite);
    document.getElementById('headerConnectBtn').addEventListener('click', () => {
      if (state.wallet) tonConnectUI.disconnect();
      else tonConnectUI.openModal();
    });

    setInterval(() => {
      if (state.energy < CONFIG.MAX_ENERGY) {
        state.energy = Math.min(CONFIG.MAX_ENERGY, state.energy + CONFIG.REGEN_RATE);
        updateUI();
      }
    }, 4000);
  });
</script>

</body>
</html>

```
